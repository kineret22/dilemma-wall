<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח מנחה — קיר הדילמות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0b14;
      --surface:  #13131f;
      --card:     #1a1a2e;
      --card2:    #1f1f38;
      --border:   rgba(255,255,255,0.07);
      --gold:     #f0c040;
      --glow:     rgba(240,192,64,0.12);
      --accent:   #7c6af7;
      --accent2:  #5a4fd4;
      --text:     #f0eeea;
      --muted:    #8888aa;
      --red:      #e05050;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo-badge {
      background: var(--gold);
      color: #0b0b14;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 700;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(80,200,80,0.12);
      border: 1px solid rgba(80,200,80,0.3);
      color: #6de06d;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #6de06d;
      border-radius: 50%;
      animation: pulse-green 1.4s infinite;
    }
    @keyframes pulse-green {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .btn {
      border: none; cursor: pointer;
      font-family: 'Heebo', sans-serif;
      font-weight: 600; font-size: 13px;
      padding: 8px 16px; border-radius: 9px;
      transition: all 0.15s;
    }
    .btn-gold {
      background: var(--gold); color: #0b0b14;
    }
    .btn-gold:hover { background: #f5d060; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--muted); color: var(--text); }
    .btn-danger {
      background: rgba(224,80,80,0.12);
      border: 1px solid rgba(224,80,80,0.3);
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(224,80,80,0.2); }

    /* ── MAIN LAYOUT ── */
    .main {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      height: calc(100dvh - 65px);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 24px;
      overflow-y: auto;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    /* question editor */
    .question-display {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .question-display p {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 14px;
    }
    .question-display textarea {
      display: none;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      resize: none;
      min-height: 90px;
      outline: none;
      margin-bottom: 12px;
      direction: rtl;
    }
    .question-display textarea:focus {
      border-color: var(--accent);
    }
    .q-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* stats */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .danger-zone {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    /* ── ANSWERS PANEL ── */
    .answers-panel {
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .answers-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .answers-title {
      font-size: 20px;
      font-weight: 800;
    }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }
    .empty-text { font-size: 16px; }
    .empty-sub  { font-size: 13px; opacity: 0.6; }

    /* answer card */
    .answer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      position: relative;
      animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      flex-shrink: 0;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .answer-card:hover {
      border-color: rgba(255,255,255,0.14);
      background: var(--card2);
    }

    .answer-number {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .answer-text {
      font-size: 16px;
      line-height: 1.65;
      font-weight: 400;
    }
    .answer-time {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 10px;
      text-align: left;
      direction: ltr;
    }

    /* new-answer highlight */
    .answer-card.new-flash {
      border-color: var(--gold);
      box-shadow: 0 0 16px var(--glow);
      animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                 flashBorder 1.4s ease 0.35s forwards;
    }
    @keyframes flashBorder {
      from { border-color: var(--gold); box-shadow: 0 0 16px var(--glow); }
      to   { border-color: var(--border); box-shadow: none; }
    }

    /* modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      max-width: 420px; width: 90%;
      text-align: center;
    }
    .modal h3 { font-size: 20px; margin-bottom: 12px; }
    .modal p  { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }

    /* toast */
    .toast {
      position: fixed; bottom: 24px; right: 28px;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px; font-weight: 500;
      transform: translateY(60px); opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { border-left: none; border-bottom: 1px solid var(--border); max-height: 320px; }
      .answers-panel { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="logo-badge">מנחה</span>
    <span class="topbar-title">קיר הדילמות הניהוליות</span>
  </div>
  <div class="topbar-right">
    <div class="live-badge">
      <span class="live-dot"></span>
      זמן אמת
    </div>
    <a href="/" target="_blank" class="btn btn-outline">פתח מסך משתתפים ↗</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div>
      <div class="sidebar-section-title">הדילמה הנוכחית</div>
      <div class="question-display" id="questionDisplay">
        <p id="questionParagraph">טוען…</p>
        <textarea id="questionEditor" placeholder="הקלד/י שאלה חדשה…"></textarea>
        <div class="q-actions">
          <button class="btn btn-gold" id="editSaveBtn" onclick="toggleEdit()">ערוך שאלה</button>
          <button class="btn btn-outline" id="cancelBtn" onclick="cancelEdit()" style="display:none">ביטול</button>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-section-title">סטטיסטיקה</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">תשובות נשלחו</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="statLast">—</div>
          <div class="stat-label">תשובה אחרונה</div>
        </div>
      </div>
    </div>

    <div class="danger-zone">
      <div class="sidebar-section-title">אזור מנהל</div>
      <button class="btn btn-danger" onclick="openClearModal()" style="width:100%">
        🗑 נקה את כל התשובות
      </button>
    </div>

  </aside>

  <!-- ANSWERS PANEL -->
  <section class="answers-panel" id="answersPanel">
    <div class="answers-header">
      <div class="answers-title">תשובות המשתתפים</div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-text">ממתין לתשובות…</div>
      <div class="empty-sub">שתף את הקישור עם המשתתפים כדי להתחיל</div>
    </div>
  </section>

</div>

<!-- CLEAR MODAL -->
<div class="modal-overlay" id="clearModal">
  <div class="modal">
    <h3>נקה את כל התשובות?</h3>
    <p>פעולה זו תמחק את כל התשובות שנאספו עד כה. לא ניתן לבטל פעולה זו.</p>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="clearAnswers()">כן, מחק הכל</button>
      <button class="btn btn-outline" onclick="closeClearModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let answers = [];
  let knownIds = new Set();
  let isEditing = false;
  let currentQuestion = '';

  // ── QUESTION ──
  async function loadQuestion() {
    try {
      const res = await fetch('/api/question');
      const d = await res.json();
      currentQuestion = d.question;
      document.getElementById('questionParagraph').textContent = currentQuestion;
      document.getElementById('questionEditor').value = currentQuestion;
    } catch {}
  }

  function toggleEdit() {
    if (!isEditing) {
      isEditing = true;
      document.getElementById('questionParagraph').style.display = 'none';
      const ed = document.getElementById('questionEditor');
      ed.style.display = 'block';
      ed.focus();
      document.getElementById('editSaveBtn').textContent = 'שמור שאלה';
      document.getElementById('cancelBtn').style.display = 'inline-block';
    } else {
      saveQuestion();
    }
  }

  function cancelEdit() {
    isEditing = false;
    document.getElementById('questionParagraph').style.display = 'block';
    document.getElementById('questionEditor').style.display = 'none';
    document.getElementById('editSaveBtn').textContent = 'ערוך שאלה';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('questionEditor').value = currentQuestion;
  }

  async function saveQuestion() {
    const newQ = document.getElementById('questionEditor').value.trim();
    if (!newQ) { showToast('השאלה לא יכולה להיות ריקה'); return; }
    try {
      await fetch('/api/question', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: newQ })
      });
      currentQuestion = newQ;
      document.getElementById('questionParagraph').textContent = newQ;
      cancelEdit();
      knownIds.clear();
      answers = [];
      renderAnswers();
      showToast('השאלה עודכנה — התשובות אופסו');
    } catch { showToast('שגיאה בשמירת השאלה'); }
  }

  // ── ANSWERS POLLING ──
  async function fetchAnswers() {
    try {
      const res = await fetch('/api/answers');
      const data = await res.json();

      const newOnes = data.filter(a => !knownIds.has(a.id));
      if (newOnes.length > 0) {
        newOnes.forEach(a => knownIds.add(a.id));
        answers = data;
        renderAnswers(newOnes.map(a => a.id));
      }
    } catch {}
  }

  function renderAnswers(flashIds = []) {
    const panel = document.getElementById('answersPanel');
    const empty = document.getElementById('emptyState');

    // remove old cards
    panel.querySelectorAll('.answer-card').forEach(c => c.remove());

    if (answers.length === 0) {
      empty.style.display = 'flex';
      updateStats();
      return;
    }
    empty.style.display = 'none';

    [...answers].reverse().forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'answer-card' + (flashIds.includes(a.id) ? ' new-flash' : '');
      card.innerHTML = `
        <div class="answer-number">תשובה #${answers.length - i}</div>
        <div class="answer-text">${escapeHTML(a.text)}</div>
        <div class="answer-time">${formatTime(a.timestamp)}</div>
      `;
      panel.appendChild(card);
    });

    updateStats();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = answers.length;
    if (answers.length > 0) {
      const last = answers[answers.length - 1];
      document.getElementById('statLast').textContent = formatTime(last.timestamp);
    } else {
      document.getElementById('statLast').textContent = '—';
    }
  }

  // ── CLEAR ──
  function openClearModal()  { document.getElementById('clearModal').classList.add('open'); }
  function closeClearModal() { document.getElementById('clearModal').classList.remove('open'); }

  async function clearAnswers() {
    try {
      await fetch('/api/answers', { method: 'DELETE' });
      answers = [];
      knownIds.clear();
      renderAnswers();
      closeClearModal();
      showToast('כל התשובות נמחקו');
    } catch { showToast('שגיאה במחיקה'); }
  }

  // ── UTILS ──
  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── INIT ──
  loadQuestion();
  fetchAnswers();
  setInterval(fetchAnswers, 3000);
</script>
</body>
</html>
