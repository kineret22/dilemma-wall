<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קיר הדילמות הניהוליות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #16162a;
      --card:      #1e1e38;
      --border:    rgba(255,255,255,0.08);
      --gold:      #f0c040;
      --gold-dim:  #c89e2a;
      --glow:      rgba(240,192,64,0.18);
      --text:      #f0eeea;
      --muted:     #8888aa;
      --accent:    #7c6af7;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ambient background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,106,247,0.15), transparent 70%);
      top: -100px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(240,192,64,0.1), transparent 70%);
      bottom: -80px; right: -100px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* header */
    .header {
      text-align: center;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      margin-bottom: 8px;
    }
    .title {
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 900;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* question bubble */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      position: relative;
      box-shadow: 0 0 40px var(--glow), 0 4px 24px rgba(0,0,0,0.4);
    }
    .question-card::before {
      content: '"';
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 72px;
      line-height: 1;
      color: var(--gold);
      opacity: 0.18;
      font-family: Georgia, serif;
    }
    .question-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .question-text {
      font-size: clamp(17px, 3.5vw, 22px);
      font-weight: 500;
      line-height: 1.65;
      color: var(--text);
    }
    .question-text.loading {
      color: var(--muted);
      font-style: italic;
    }

    /* answer area */
    .answer-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .answer-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      padding: 18px 20px;
      resize: none;
      min-height: 140px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      direction: rtl;
    }
    textarea::placeholder { color: var(--muted); opacity: 0.6; }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    .char-count {
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
    }
    .char-count.warn { color: #f07040; opacity: 1; }

    .submit-btn {
      background: var(--gold);
      color: #0f0f1a;
      border: none;
      border-radius: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 32px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      width: 100%;
      letter-spacing: 0.03em;
    }
    .submit-btn:hover:not(:disabled) {
      background: #f5d060;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240,192,64,0.35);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .anon-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.55;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .anon-note svg { opacity: 0.7; }

    /* success state */
    .success-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 40px 20px;
    }
    .success-panel.visible { display: flex; }
    .success-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(240,192,64,0.15);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
    }
    .success-sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 320px;
      line-height: 1.6;
    }

    /* error toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #c0392b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="eyebrow">סשן קבוצתי</div>
    <h1 class="title">קיר הדילמות הניהוליות</h1>
  </header>

  <div class="question-card">
    <div class="question-label">הדילמה שלנו היום</div>
    <p class="question-text loading" id="questionText">טוען שאלה…</p>
  </div>

  <div class="answer-section" id="answerSection">
    <div class="answer-label">התשובה שלך — אנונימית לחלוטין</div>
    <textarea
      id="answerInput"
      placeholder="שתף/י את מחשבתך האמיתית…"
      maxlength="500"
    ></textarea>
    <div class="char-count" id="charCount">0 / 500</div>
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">שלח תשובה →</button>
    <div class="anon-note">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      תשובתך אנונימית לחלוטין — שמך לא נשמר
    </div>
  </div>

  <div class="success-panel" id="successPanel">
    <div class="success-icon">✓</div>
    <div class="success-title">תשובתך נשלחה!</div>
    <div class="success-sub">תודה על השיתוף הכן. המנחה יציג את כלל התשובות לקבוצה.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const textarea = document.getElementById('answerInput');
  const charCount = document.getElementById('charCount');
  const submitBtn = document.getElementById('submitBtn');

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = `${len} / 500`;
    charCount.className = 'char-count' + (len > 450 ? ' warn' : '');
  });

  async function loadQuestion() {
    try {
      const res = await fetch('/api/question');
      const data = await res.json();
      const el = document.getElementById('questionText');
      el.textContent = data.question;
      el.classList.remove('loading');
    } catch {
      document.getElementById('questionText').textContent =
        'לא ניתן לטעון את השאלה. רענן את הדף.';
    }
  }

  async function submitAnswer() {
    const text = textarea.value.trim();
    if (!text) { showToast('אנא כתוב/י תשובה לפני השליחה'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'שולח…';

    try {
      const res = await fetch('/api/answers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error();
      document.getElementById('answerSection').style.display = 'none';
      document.getElementById('successPanel').classList.add('visible');
    } catch {
      showToast('שגיאה בשליחה — נסה/י שוב');
      submitBtn.disabled = false;
      submitBtn.textContent = 'שלח תשובה →';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadQuestion();
</script>
</body>
</html>
