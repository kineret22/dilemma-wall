<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קיר הדילמות — תצוגה ציבורית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0B1F4D;
      --surface:  #142B63;
      --card:     #1D3B82;
      --card2:    #223f8a;
      --border:   rgba(255,255,255,0.09);
      --gold:     #F4B400;
      --glow:     rgba(244,180,0,0.18);
      --text:     #FFFFFF;
      --muted:    #8899cc;
      --accent:   #7c6af7;
      --green:    #6de06d;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ambient blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12), transparent 70%);
      top: -180px; left: -180px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(244,180,0,0.1), transparent 70%);
      bottom: -120px; right: -120px;
    }

    /* ── HEADER ── */
    .header {
      position: relative;
      z-index: 2;
      background: rgba(11,31,77,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 20px 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
    }

    .header-left {}
    .eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); opacity: 0.85; margin-bottom: 6px;
    }
    .question-counter {
      font-size: 13px; color: var(--muted); margin-bottom: 6px;
    }
    .question-text {
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      max-width: 900px;
    }
    .question-text.loading {
      color: var(--muted); font-style: italic; font-weight: 400;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 28px;
      min-width: 120px;
      text-align: center;
    }
    .counter-num {
      font-size: 48px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }
    .counter-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* live dot */
    .live-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px;
      font-size: 11px; color: var(--green);
      font-weight: 600; letter-spacing: 0.1em;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── FEED ── */
    .feed-wrap {
      position: relative;
      z-index: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* fade edges */
    .feed-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(to bottom, var(--bg), transparent);
      z-index: 3;
      pointer-events: none;
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 28px 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* hide scrollbar */
    .feed::-webkit-scrollbar { width: 0; }

    /* ── ANSWER CARD ── */
    .answer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 28px;
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      flex-shrink: 0;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .answer-card.new-flash {
      border-color: var(--gold);
      box-shadow: 0 0 24px var(--glow);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                 flashFade 2s ease 0.5s forwards;
    }
    @keyframes flashFade {
      from { border-color: var(--gold); box-shadow: 0 0 24px var(--glow); }
      to   { border-color: var(--border); box-shadow: none; }
    }

    .answer-num {
      font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.12em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .answer-text {
      font-size: clamp(15px, 1.8vw, 20px);
      font-weight: 400;
      line-height: 1.65;
      color: var(--text);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      text-align: center;
      padding: 60px;
    }
    .empty-icon { font-size: 56px; opacity: 0.25; }
    .empty-text { font-size: 20px; opacity: 0.6; }
    .empty-sub  { font-size: 14px; opacity: 0.4; }

    /* ── NEW QUESTION FLASH overlay ── */
    .q-flash-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      background: rgba(11,31,77,0.92);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; text-align: center;
      animation: fadeInOut 2.2s ease forwards;
    }
    .q-flash-overlay.show { display: flex; }
    @keyframes fadeInOut {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .q-flash-label {
      font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); opacity: 0.8;
    }
    .q-flash-text {
      font-size: clamp(22px, 3.5vw, 40px);
      font-weight: 700; line-height: 1.4;
      color: var(--text); max-width: 800px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="eyebrow">קיר הדילמות הניהוליות</div>
    <div class="question-counter" id="questionCounter"></div>
    <div class="question-text loading" id="questionText">טוען שאלה…</div>
  </div>
  <div class="header-right">
    <div class="counter-num" id="counterNum">0</div>
    <div class="counter-label">תשובות</div>
    <div class="live-row">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>
</div>

<!-- FEED -->
<div class="feed-wrap">
  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-text">ממתין לתשובות…</div>
      <div class="empty-sub">המשתתפים יכולים לשלוח תשובות עכשיו</div>
    </div>
  </div>
</div>

<!-- NEW QUESTION FLASH -->
<div class="q-flash-overlay" id="qFlash">
  <div class="q-flash-label">שאלה חדשה</div>
  <div class="q-flash-text" id="qFlashText"></div>
</div>

<script>
  let currentIndex = null;
  let answers      = [];
  let knownIds     = new Set();

  // ── POLL QUESTION ──
  async function pollQuestion() {
    try {
      const res = await fetch('/api/questions');
      const d   = await res.json();
      const newIndex = d.currentIndex || 0;
      const questions = d.questions || [];

      if (newIndex !== currentIndex) {
        const isFirst = currentIndex === null;
        currentIndex = newIndex;

        // update header
        const qt = document.getElementById('questionText');
        qt.textContent = questions[currentIndex] || '—';
        qt.classList.remove('loading');

        document.getElementById('questionCounter').textContent =
          `שאלה ${currentIndex + 1} מתוך ${questions.length}`;

        // flash overlay (not on first load)
        if (!isFirst) {
          showQFlash(questions[currentIndex]);
        }

        // reset answers for new question
        answers  = [];
        knownIds = new Set();
        document.getElementById('counterNum').textContent = '0';
        renderFeed();
        await fetchAnswers();
      }
    } catch {}
  }

  // ── POLL ANSWERS ──
  async function fetchAnswers() {
    if (currentIndex === null) return;
    try {
      const res  = await fetch(`/api/answers?q=${currentIndex}`);
      const data = await res.json();
      const newOnes = data.filter(a => !knownIds.has(a.id));
      if (newOnes.length > 0) {
        newOnes.forEach(a => knownIds.add(a.id));
        answers = data;
        renderFeed(newOnes.map(a => a.id));
        document.getElementById('counterNum').textContent = answers.length;
      }
    } catch {}
  }

  // ── RENDER FEED ──
  function renderFeed(flashIds = []) {
    const feed  = document.getElementById('feed');
    const empty = document.getElementById('emptyState');

    // remove existing cards
    feed.querySelectorAll('.answer-card').forEach(c => c.remove());

    if (answers.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    // newest at bottom — append in order
    answers.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'answer-card' + (flashIds.includes(a.id) ? ' new-flash' : '');
      card.innerHTML = `
        <div class="answer-num">תשובה ${i + 1}</div>
        <div class="answer-text">${escapeHTML(a.text)}</div>
      `;
      feed.appendChild(card);
    });

    // scroll to bottom to show latest
    feed.scrollTop = feed.scrollHeight;
  }

  // ── NEW QUESTION FLASH OVERLAY ──
  function showQFlash(text) {
    const overlay = document.getElementById('qFlash');
    document.getElementById('qFlashText').textContent = text;
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 2400);
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── INIT ──
  pollQuestion();
  setInterval(pollQuestion, 3000);
  setInterval(fetchAnswers, 3000);
</script>
</body>
</html>
